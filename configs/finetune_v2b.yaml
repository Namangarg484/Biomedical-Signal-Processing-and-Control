# ======================================================================
# PINNACLE v2 — Phase 2: Fine-tuning with seed sweep
# ======================================================================
# Same as finetune_v2.yaml but with seed=123 for a different split
# ======================================================================

# --- Data ---
data:
  dir: "New data"
  num_classes: 30
  seq_len: 1000

# --- Pre-trained model ---
pretrained:
  checkpoint: "outputs_30class_v2/checkpoints/best_model.pth"

# --- Model ---
model:
  embed_dim: 128
  dropout: 0.3
  use_fusion: true

# --- Fine-tuning strategy ---
finetuning:
  epochs: 40
  batch_size: 16
  lr: 0.00005
  weight_decay: 0.001
  scheduler: "cosine"
  seed: 123
  patience: 12
  ema_decay: 0.999
  freeze_backbone_epochs: 5
  val_fraction: 0.2

# --- Output ---
output:
  checkpoint_dir: "outputs_30class_finetune_v2b/checkpoints"
  log_dir: "outputs_30class_finetune_v2b/logs"
  figure_dir: "outputs_30class_finetune_v2b/figures"
