# ======================================================================
# PINNACLE — Phase 2: Domain Adaptation Fine-Tuning
# ======================================================================
# Pre-trained backbone from Phase 1 (reference set, 91.52% val)
# Fine-tune on target-domain finetune set (3K samples, 30 classes)
# ======================================================================

# --- Data ---
data:
  dir: "New data"
  num_classes: 30
  seq_len: 1000

# --- Pre-trained model ---
pretrained:
  checkpoint: "outputs_30class/checkpoints/best_model.pth"

# --- Model ---
model:
  embed_dim: 128
  dropout: 0.3
  use_fusion: true

# --- Fine-tuning strategy ---
finetuning:
  epochs: 30
  batch_size: 16          # Smaller batch for small dataset
  lr: 0.00005             # 20x lower than pre-training
  weight_decay: 0.001     # Stronger regularization
  scheduler: "cosine"
  seed: 42
  patience: 10
  ema_decay: 0.999
  freeze_backbone_epochs: 5   # Freeze encoder for first 5 epochs (train classifier only)
  val_fraction: 0.2           # 80/20 split of finetune set

# --- Output ---
output:
  checkpoint_dir: "outputs_30class_finetune/checkpoints"
  log_dir: "outputs_30class_finetune/logs"
  figure_dir: "outputs_30class_finetune/figures"
