# PINNACLE v17 - ALL IMPROVEMENTS ENABLED
# Target: 90%+ Test Accuracy

cells: 3
nodes: 4
embed_dim: 128
num_classes: 7
fusion: true

epochs: 50
batch_size: 8
lr_model: 0.0003
lr_arch: 0.00005
arch_warmup: 10
weight_decay: 0.0005
gradient_clip: 1.0

optimizer: 'adamw'
scheduler: 'constant'

augmentation:
  enabled: true
  raman:
    noise_std: 0.02
    shift_range: 10
    scale_range: 0.1
    baseline_drift: true
    peak_broadening: true
    probability: 0.7
  image:
    horizontal_flip: true
    rotation: 15
    color_jitter: 0.2
    brightness: 0.2
    contrast: 0.2
    probability: 0.5

mixup:
  enabled: true
  alpha: 0.2
  probability: 0.5

test_time_augmentation:
  enabled: true
  n_iterations: 5

early_stopping:
  enabled: true
  patience: 12
  min_delta: 0.001

weighted_loss: true

architecture_search:
  freeze_schedule:
    15: [0]
    25: [0, 1]
    35: [0, 1, 2]

data_dir: './data/'
image_dir: './data/'
log_dir: './outputs/logs'

seed: 42
deterministic: true
cudnn_benchmark: false
use_amp: false
num_workers: 2
pin_memory: true
